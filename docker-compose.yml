services:
  app:
    build:
      context: ./php
    container_name: rubrica_app
    working_dir: /var/www/html

    volumes:
      - ./Backend:/var/www/html

    ports:
      - "8000:8000"

    depends_on:
      - db

    command: sh -c "composer install && php artisan serve --host=0.0.0.0 --port=8000"
  frontend:
    image: nginx:alpine
    container_name: rubrica_frontend
    restart: unless-stopped

    volumes:
      - ./Frontend:/usr/share/nginx/html:ro

    ports:
      - "3000:80"

    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: rubrica_db
    restart: unless-stopped

    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel

    ports:
      - "3306:3306"

    volumes:
      - db_rubrica:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: rubrica_phpmyadmin
    restart: unless-stopped

    depends_on:
      - db

    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root

    ports:
      - "8080:80"

volumes:
  db_rubrica: