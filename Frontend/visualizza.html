<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubrica - Visualizza e Modifica</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container page-container">

        <nav class="top-nav">
            <a href="crea.html" class="nav-link-create">➕ Crea Nuovo Contatto</a>
        </nav>

        <!-- SEZIONE MODIFICA -->
        <section class="form-panel panel-blue">
            <h2 class="panel-title panel-title--blue">✏️ Modifica Contatto</h2>

            <div class="form-group form-group--highlight-blue">
                <label for="contactSelectEdit" class="label-bold">Seleziona il contatto da modificare:</label>
                <select id="contactSelectEdit" class="form-control">
                    <option value="" disabled>-- Scegli un contatto da modificare --</option>
                </select>
            </div>

            <div id="editContactFormContainer" class="edit-form-container hidden">
                <h3 id="editTitle" class="edit-form-title"></h3>

                <div class="form-group">
                    <label for="editName">Nome</label>
                    <input type="text" id="editName" class="form-control">
                </div>

                <div class="form-group">
                    <label for="editSurname">Cognome</label>
                    <input type="text" id="editSurname" class="form-control">
                </div>

                <div class="form-group">
                    <label for="editDescription">Descrizione</label>
                    <textarea id="editDescription" class="form-control textarea-resizable" rows="3"></textarea>
                </div>

                <div class="fav-row">
                    <span class="fav-label">Preferito:</span>
                    <label class="card-fav-toggle">
                        <input type="checkbox" id="editIsFavorite">
                        <span class="star">★</span>
                    </label>
                </div>

                <div class="form-group">
                    <label class="label-bold label-block">Numeri di Telefono</label>
                    <div id="editPhoneContainer">
                        <div class="dynamic-row"></div>
                    </div>
                    <button type="button" id="btnAddPhoneField" class="btn-secondary">➕ Aggiungi Telefono</button>
                </div>

                <div class="form-group">
                    <label class="label-bold label-block">Indirizzi Email</label>
                    <div id="editEmailContainer">
                        <div class="dynamic-row"></div>
                    </div>
                    <button type="button" id="btnAddEmailField" class="btn-secondary">➕ Aggiungi Email</button>
                </div>

                <div class="form-group form-group--last">
                    <label class="label-bold label-block">Indirizzi di Residenza</label>
                    <div id="editAddressContainer">
                        <div class="dynamic-row">
                            <input type="text" class="form-control edit-address-input" placeholder="Indirizzo principale">
                            <button type="button" class="btn-remove-field" onclick="this.parentElement.remove()">❌</button>
                        </div>
                    </div>
                    <button type="button" id="btnAddAddressField" class="btn-secondary">➕ Aggiungi Indirizzo</button>
                </div>

                <div class="action-buttons-container">
                    <button type="button" id="btnUpdateContact" class="btn-submit btn-save">
                        💾 Salva Modifiche su Backend
                    </button>
                    <button type="button" id="btnDeleteContact" class="btn-danger btn-delete">
                        🗑️ Elimina Contatto
                    </button>
                </div>
            </div>
        </section>

        <hr class="section-divider">

        <!-- SEZIONE VISUALIZZA -->
        <section class="list-panel panel-green">
            <h2 class="panel-title panel-title--green">🔍 Cerca e Visualizza Contatti</h2>

            <div class="search-container">
                <div class="dynamic-input-group">
                    <input type="text" id="searchName" class="form-control" placeholder="Cerca contatto per nome...">
                </div>
            </div>

            <label for="contactSelect" class="label-bold label-block">Contatti:</label>
            <div class="form-group contact-list-box" id="contactSelect"></div>

            <!-- SCHEDA DETTAGLIO -->
            <div id="backendContactContainer" class="contact-detail-container hidden">
                <h3 class="contact-detail-title">📇 Scheda Contatto</h3>

                <div class="contact-detail-grid">

                    <!-- Nome e Cognome -->
                    <div class="detail-card detail-card--gray">
                        <span class="detail-card__label">Nome e Cognome</span>
                        <div class="detail-card__name-row">
                            <div>
                                <span id="viewDetailName">--</span>
                                <span id="viewDetailSurname">--</span>
                                <span id="viewDetailFav" class="fav-star hidden">★</span>
                            </div>
                            <div id="viewDetailFavBadge" class="fav-badge hidden">
                                <span>⭐ Contatto Preferito</span>
                            </div>
                        </div>
                    </div>

                    <!-- Telefoni -->
                    <div class="detail-card detail-card--cyan">
                        <span class="detail-card__label">📞 Telefoni</span>
                        <div id="viewDetailNumeriContainer" class="detail-card__list"></div>
                    </div>

                    <!-- Email -->
                    <div class="detail-card detail-card--orange">
                        <span class="detail-card__label">✉️ Indirizzi Email</span>
                        <div id="viewDetailEmailContainer" class="detail-card__list"></div>
                    </div>

                    <!-- Indirizzi -->
                    <div class="detail-card detail-card--teal">
                        <span class="detail-card__label">📍 Indirizzi Residenza</span>
                        <div id="viewDetailIndirizzoContainer" class="detail-card__list"></div>
                    </div>

                    <!-- Descrizione -->
                    <div class="detail-card detail-card--purple">
                        <span class="detail-card__label">📝 Descrizione</span>
                        <div id="viewDetailDescription" class="detail-card__description"></div>
                    </div>

                </div>
            </div>

            <div class="contacts-grid" id="contactsGrid"></div>
        </section>

    </div>

    <script src="api.js"></script>
    <script src="main_visualizza.js"></script>
</body>

</html>
