<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubrica Telefonica Smart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        
        <div class="form-panel">
            <h2>Aggiungi Contatto</h2>
                
                <div class="form-group">
                    <label for="name">Nome</label>
                    <input type="text" id="name" class="form-control" placeholder="es. Mario" required>
                    <label for="surname">Cognome</label>
                    <input type="text" id="surname" class="form-control" placeholder="es. Rossi" required>
                </div>

                <div class="form-group">
                    <label>Numeri di Telefono</label>
                    <div class="dynamic-input-group">
                        <input type="tel" id="number" class="form-control" placeholder="es. +39 333 1234567">
                        <button type="button" id="addNumber" class="btn-add-field" title="Aggiungi numero">+</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Indirizzi Email</label>
                    <div class="dynamic-input-group">
                        <input type="email" id="email" class="form-control" placeholder="es. mario.rossi@email.com">
                        <button type="button" id="addEmail" class="btn-add-field" title="Aggiungi email">+</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Indirizzi</label>
                    <div class="dynamic-input-group">
                        <input type="text" id="address" class="form-control" placeholder="es. Via Roma 10, Milano">
                        <button type="button" id="addAddress" class="btn-add-field" title="Aggiungi indirizzo">+</button>
                    </div>
                </div>
                <button type="submit" id="postContact" class="btn-submit">Salva in Rubrica</button>
            
        </div>
<!--------------->
        <div class="list-panel">
            <h2>I tuoi Contatti</h2>
            
            <div class="search-bar">
                <input type="text" id="search" class="form-control" placeholder="Cerca contatto per nome o cognome...">
            </div>

            <div class="contacts-grid" id="contactsGrid">
                
                <div class="contact-card">
                    <div class="contact-header">
                        <span class="contact-name">Mario Rossi</span>
                        <label class="card-fav-toggle">
                            <input type="checkbox" checked>
                            <span class="star">★</span>
                        </label>
                    </div>
                    
                    <div class="detail-section">
                        <div id="getResult" class="detail-title">Numeri di Telefono</div>
                        <ul class="detail-list">
                            <li>+39 333 1234567</li>
                            <li>+39 02 9876543</li>
                        </ul>
                    </div>

                    <div class="detail-section">
                        <div class="detail-title">Indirizzi Email</div>
                        <ul class="detail-list">
                            <li>mario.rossi@email.com</li>
                        </ul>
                    </div>

                    <div class="detail-section">
                        <div class="detail-title">Indirizzi</div>
                        <ul class="detail-list">
                            <li>Via Roma 10, Milano</li>
                        </ul>
                    </div>
                </div>

                <div class="contact-card">
                    <div class="contact-header">
                        <span class="contact-name">Luca Bianchi</span>
                        <label class="card-fav-toggle">
                            <input type="checkbox">
                            <span class="star">★</span>
                        </label>
                    </div>
                    
                    <div class="detail-section">
                        <div class="detail-title">Numeri di Telefono</div>
                        <ul class="detail-list">
                            <li>+39 347 5556677</li>
                        </ul>
                    </div>

                    <div class="detail-section">
                        <div class="detail-title">Indirizzi Email</div>
                        <ul class="detail-list">
                            <li>luca.bianchi@email.it</li>
                        </ul>
                    </div>
                </div>

            </div>
        </div>

    </div>
    <script src="api.js"></script>
    <script src="main.js"></script>
</body>
</html>
